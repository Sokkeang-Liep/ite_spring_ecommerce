server:
  port: 8888
file:
  client-path: /file
  storage-location: C:\Users\liep sokkeang\Desktop\Spring_ITE\ite-file\
  base-uri: http://localhost:${server.port}${file.client-path}/
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB  #this must bigger than file-size
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${URL}
    username: ${USERNAME}
    password: ${PASSWORD}
  application:
    name: ite-3rd-ecommerce

